<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acorpio | Premium Accessories</title>
    <link rel="stylesheet" href="style.css">
    <!-- Font Awesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <!-- Navigation Bar -->
    <nav class="navbar">
        <div class="logo">ACORPIO</div>
        
          <span class="store-name">Modern Accrssories for Modern Life</span>
        </div>
            
         
        <div class="search-bar">
            <input type="text" placeholder="Search for accessories...">
            <button><i class="fas fa-search"></i></button>
        </div>
        <ul class="nav-links">
            <li><a href="index.html" class="active">Home</a></li>
            <li><a href="contact.html">Contact & Feedback</a></li>
            <li><a href="#"><i class="fas fa-shopping-cart"></i> <span id="cart-count">0</span></a></li>
        </ul>
        <div class="menu-toggle" id="mobile-menu">
            <i class="fas fa-bars"></i>
        </div>
    </nav>

    <!-- Hero Section -->
    <header class="hero">
        <div class="hero-content">
            <h1>Upgrade Your Tech Life</h1>
            <p>Premium cases, chargers, and laptop accessories.</p>
            <a href="#products" class="btn-hero">Shop Now</a>
        </div>
    </header>

    <!-- Main Content -->
    <main id="products" class="container">
        <div class="section-title">
            <h2>Our Products</h2>
        </div>

        <!-- Category Filters -->
        <div class="filters">
            <button class="filter-btn active" data-category="all">All</button>
            <button class="filter-btn" data-category="laptops">Laptops</button>
            <button class="filter-btn" data-category="mobiles">Mobiles</button>
        </div>

        <!-- Product Grid -->
        <div class="product-grid" id="product-grid">
            <!-- Products will be injected here by JavaScript -->
        </div>
    </main>

    <!-- Footer -->
    <footer>
        <div class="footer-content">
            <p>&copy; 2026 Acorpio. All rights reserved.</p>
            <div class="socials">
                <a href="#"><i class="fab fa-facebook"></i></a>
                <a href="#"><i class="fab fa-instagram"></i></a>
                <a href="#"><i class="fab fa-twitter"></i></a>
            </div>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
