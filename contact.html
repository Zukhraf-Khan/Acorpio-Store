<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acorpio | Contact & Feedback</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <!-- Navigation -->
    <nav class="navbar">
        <div class="logo">ACORPIO</div>
        <div class="search-bar">
            <input type="text" placeholder="Search...">
            <button><i class="fas fa-search"></i></button>
        </div>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="contact.html" class="active">Contact & Feedback</a></li>
            <li><a href="#"><i class="fas fa-shopping-cart"></i> <span id="cart-count">0</span></a></li>
        </ul>
        <div class="menu-toggle" id="mobile-menu">
            <i class="fas fa-bars"></i>
        </div>
    </nav>

    <div class="container contact-wrapper">
        
        <!-- Contact Section -->
        <section class="contact-section">
            <h2>Get in Touch</h2>
            <p>Have questions? We are here to help.</p>
            <div class="contact-info">
                <div class="info-item">
                    <i class="fas fa-envelope"></i>
                    <span>support@acorpio.com</span>
                </div>
                <div class="info-item">
                    <i class="fas fa-phone"></i>
                    <span>+1 234 567 890</span>
                </div>
                <div class="info-item">
                    <i class="fas fa-map-marker-alt"></i>
                    <span>Haripur \ Opposite Judicial Complex</span>
                </div>
            </div>
        </section>

        <!-- Feedback Form -->
        <section class="form-section">
            <h2>Leave Feedback</h2>
            <form class="feedback-form" onsubmit="event.preventDefault(); alert('Thank you for your feedback!');">
                <div class="form-group">
                    <label>Your Name</label>
                    <input type="text" placeholder="John Doe" required>
                </div>
                <div class="form-group">
                    <label>Your Email</label>
                    <input type="email" placeholder="zukhraftareen@.com" required>
                </div>
                <div class="form-group">
                    <label>Your Feedback</label>
                    <textarea rows="5" placeholder="Tell us what you think..." required></textarea>
                </div>
                <button type="submit" class="btn-primary">Submit Feedback</button>
            </form>
        </section>
    </div>

    <footer>
        <div class="footer-content">
            <p>&copy; 2026 Acorpio. All rights reserved.</p>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
